# ================= DATABASE (SUPPORTS LOCAL & RENDER) =================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/bank_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# ================= TWILIO 🔐 USING ENV VARIABLES =================
twilio.account_sid=${TWILIO_SID}
twilio.auth_token=${TWILIO_TOKEN}
twilio.phone_number=${TWILIO_PHONE}


# ================= WEATHER 🔐 USING ENV VARIABLES =================
weather.api.key=${WEATHER_API_KEY}